<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.edupluscampus.com/img/logos/favicon.png">
    <title>EduPlusCampus</title>
    <!-- Material Design Icons and Google Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #eef2f9; /* Lavender-blue background from image */
            --bg-muted: #f8f9fa;
            --primary: #3b69b5;
            --secondary: #e91e63;
            --emerald: #10b981;
            --border: #e4e4e7;
            --text-main: #18181b;
            --text-muted: #71717a;
            --speed-green: #2e7d32;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Roboto', sans-serif;
            height: 100%;
            display: flex; flex-direction: column;
            background-color: #fff;
            overflow: hidden;
        }

        /* --- UPDATED HEADER (image_57d984.png) --- */
        .v-toolbar__content {
            background-color: var(--header-bg);
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; }
        .logo-box { height: 50px; width: 50px; margin-right: 15px; display: flex; align-items: center; }
        .logo-box img { height: 100%; object-fit: contain; }
        .org-name { font-weight: 700; font-size: 1.15rem; color: #000; letter-spacing: -0.2px; }

        .header-right { 
            display: flex; 
            align-items: center;
            flex: 0 0 50%; /* Force width to 50% */
            justify-content: flex-end; /* Align content to the right */
        }
        .speed-text { 
            color: var(--speed-green); 
            font-weight: 700; 
            font-size: 14px; 
            margin-right: 24px; 
            text-transform: uppercase;
        }

        .icon-nav { 
            display: flex; 
            align-items: center; 
            flex-grow: 1; /* This makes the icon bar stretch across the 50% area */
            justify-content: space-between; /* Spreads icons evenly */
            margin-right: 12px; 
            margin-left: 20px; /* Optional: adds space between 4G text and icons */
        }
        .icon-btn { 
            width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
        }
        .icon-btn img { height: 32px; width: 32px; object-fit: contain; }

        .notif-wrapper { position: relative; display: flex; align-items: center; }
        .notif-badge {
            position: absolute;
            top: 2px; right: 2px;
            background: #d32f2f;
            color: white;
            font-size: 10px;
            font-weight: bold;
            min-width: 16px; height: 16px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .avatar-initials {
            background: #000080; /* Deep blue from image */
            color: white;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px;
            margin-left: 10px;
        }

        /* --- STUDENT BAR --- */
        .student-info-bar { height: 50px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 16px; font-size: 14px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; }
        .v-chip-active { background-color: rgba(76, 175, 80, 0.12); color: #2e7d32; padding: 0 12px; height: 28px; border-radius: 16px; display: inline-flex; align-items: center; font-size: 0.75rem; font-weight: 500; margin-left: 8px; }

        /* --- IDE TOOLBAR --- */
        .ide-toolbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-muted); border-bottom: 1px solid var(--border);
            padding: 0 12px; height: 48px;
        }
        .tab-item { display: flex; align-items: center; padding: 0 12px; height: 48px; font-size: 14px; font-weight: 500; color: var(--primary); border-bottom: 2px solid var(--primary); }
        .btn-base { display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 13px; font-weight: 600; height: 32px; padding: 0 12px; border: none; cursor: pointer; gap: 6px; color: white; }
        .btn-ai { background-color: var(--emerald); }
        .btn-java { background-color: #5c6bc0; }
        .btn-run { background-color: var(--secondary); }

        /* --- WORKSPACE --- */
        .ide-workspace { 
            width: 100%;
            height: 600px; /* Give it a fixed height so content goes beyond the screen */
        }
        iframe { border: none; width: 100%; height: 100%; }

        /* --- THE SPACE YOU ASKED FOR --- */
        .bottom-spacer {
            height: 100px; /* This creates the "gap" before the footer */
            background-color: #fff;
        }

        /* --- IMPROVED FOOTER --- */
        /* --- UPDATED FOOTER TO MATCH ORIGINAL --- */
        .footer-class {
            background-color: #3b69b5; /* Matching the exact blue */
            color: white;
            padding: 12px 0;
            width: 100%;
        }

        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .footer-content span {
            font-size: 18px;
            font-weight: 500;
        }

        /* The Eduplus Logo - No background box */
        .footer-logo img {
            height: 35px;
            width: auto;
            object-fit: contain;
            margin-right: 10px;
        }

        /* Social Icon Containers (The white rounded boxes) */
        .social-icons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .social-icons a {
            background-color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 12px; /* Gives that "squircle" look */
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        .social-icons i {
            font-size: 22px; /* Adjusted icon size to fit box */
        }

        /* Brand Colors for Icons inside the white boxes */
        .mdi-youtube { color: #FF0000; }
        .mdi-facebook { color: #1877F2; }
        .mdi-instagram { 
            /* Instagram gradient */
            background: -webkit-linear-gradient(#405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mdi-twitter { color: #1DA1F2; }
        .mdi-linkedin { color: #0A66C2; }
    </style>
</head>
